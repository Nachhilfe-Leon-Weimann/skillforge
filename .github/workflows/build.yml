name: Build

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the built image to GHCR"
        required: true
        default: false
        type: boolean
      source_ref:
        description: "Git ref or SHA to build"
        required: false
        default: ""
        type: string
      version:
        description: "Version tag to apply without leading v"
        required: false
        default: ""
        type: string
      tag_latest:
        description: "Also tag the image as latest"
        required: true
        default: false
        type: boolean
      platforms:
        description: "Target platforms for pushed images"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
  workflow_call:
    inputs:
      push:
        required: false
        default: false
        type: boolean
      source_ref:
        required: false
        default: ""
        type: string
      version:
        required: false
        default: ""
        type: string
      tag_latest:
        required: false
        default: false
        type: boolean
      platforms:
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
    secrets:
      SKILLPLATFORM_READ_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.source_ref || github.sha }}

      - name: Resolve image tags
        id: image
        env:
          IMAGE_VERSION: ${{ inputs.version }}
          IMAGE_TAG_LATEST: ${{ inputs.tag_latest }}
          IMAGE_PLATFORMS: ${{ inputs.platforms }}
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repository}"
          source_sha="$(git rev-parse HEAD)"
          short_sha="${source_sha:0:12}"

          {
            printf 'image=%s\n' "${image}"
            printf 'source_sha=%s\n' "${source_sha}"
            printf 'primary_tag=%s\n' "${image}:sha-${short_sha}"
            printf 'platforms=%s\n' "${IMAGE_PLATFORMS}"
            if [[ -n "${IMAGE_VERSION}" ]]; then
              printf 'version_tag=%s\n' "${image}:v${IMAGE_VERSION}"
            fi
            printf 'tags<<EOF\n'
            printf '%s\n' "${image}:sha-${short_sha}"
            if [[ -n "${IMAGE_VERSION}" ]]; then
              printf '%s\n' "${image}:v${IMAGE_VERSION}"
            fi
            if [[ "${IMAGE_TAG_LATEST}" == "true" ]]; then
              printf '%s\n' "${image}:latest"
            fi
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"

      - name: Validate build secret
        env:
          SKILLPLATFORM_READ_TOKEN: ${{ secrets.SKILLPLATFORM_READ_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${SKILLPLATFORM_READ_TOKEN}" ]]; then
            echo "SKILLPLATFORM_READ_TOKEN is required to build the image." >&2
            exit 1
          fi

      - name: Set up QEMU
        if: inputs.push && contains(inputs.platforms, 'arm')
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: dockerfile
          platforms: ${{ inputs.push && inputs.platforms || 'linux/amd64' }}
          push: ${{ inputs.push }}
          tags: ${{ steps.image.outputs.tags }}
          provenance: false
          secrets: |
            github_token=${{ secrets.SKILLPLATFORM_READ_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
