name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version increment to apply"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - explicit
      version:
        description: "Explicit version, required when bump is explicit"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure skill-platform access
        env:
          SKILLPLATFORM_READ_TOKEN: ${{ secrets.SKILLPLATFORM_READ_TOKEN }}
        run: |
          set -euo pipefail

          git config --global url."https://x-access-token:${SKILLPLATFORM_READ_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Compute next version
        id: version
        env:
          BUMP_KIND: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          just version-info "$BUMP_KIND" "$EXPLICIT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          just bump-version "$NEXT_VERSION"

      - name: Create version bump pull request
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          BRANCH_NAME: ${{ steps.version.outputs.branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- pyproject.toml uv.lock; then
            echo "No version changes detected."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pr_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/new/${BRANCH_NAME}"

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            if existing_pr_url="$(gh pr view "$BRANCH_NAME" --json url --jq .url 2>/dev/null)"; then
              echo "::notice title=Version bump pull request already exists::${existing_pr_url}"
              exit 0
            fi
          else
            git checkout -b "$BRANCH_NAME"
            git add pyproject.toml uv.lock openapi.json
            git commit -m "chore: bump version to ${NEXT_VERSION}"
            git push --set-upstream origin "$BRANCH_NAME"
          fi

          if gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "chore: bump version to ${NEXT_VERSION}" \
            --body "Bumps skillforge from ${CURRENT_VERSION} to ${NEXT_VERSION}."; then
            exit 0
          fi

          echo "::error title=GitHub Actions cannot create pull requests::Enable 'Allow GitHub Actions to create and approve pull requests' in repository or organization Actions settings, then re-run this workflow. Manual fallback: ${pr_url}"
          exit 1
