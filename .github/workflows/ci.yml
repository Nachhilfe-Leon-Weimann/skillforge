name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  code-quality: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: skillforge
          POSTGRES_PASSWORD: skillforge
          POSTGRES_DB: skillforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Configure skill-platform access
        env:
          SKILLPLATFORM_READ_TOKEN: ${{ secrets.SKILLPLATFORM_READ_TOKEN }}
        run: |
          set -euo pipefail

          git config --global url."https://x-access-token:${SKILLPLATFORM_READ_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run static checks
        run: just static-checks

      - name: Run tests with coverage
        env:
          TEST_DB__URL: postgresql+asyncpg://skillforge:skillforge@localhost:5432/skillforge
        run: just test-coverage

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@1c15be36fc3733ba839b1dd643bd9556e4426dc1 # v1
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest

      - name: Write coverage summary
        if: always()
        run: test ! -f coverage.xml || uv run python scripts/coverage_summary.py coverage.xml
