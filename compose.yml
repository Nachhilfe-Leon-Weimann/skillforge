services:
  migrate:
    image: ghcr.io/nachhilfe-leon-weimann/skillforge:latest
    pull_policy: always
    restart: "no"
    env_file:
      - .env
    command: [ "alembic", "upgrade", "head" ]

  app:
    image: ghcr.io/nachhilfe-leon-weimann/skillforge:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
