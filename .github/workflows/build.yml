name: Build

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the built image to GHCR"
        required: true
        default: false
        type: boolean
      source_ref:
        description: "Git ref or SHA to build"
        required: false
        default: ""
        type: string
      version:
        description: "Version tag to apply without leading v"
        required: false
        default: ""
        type: string
      tag_latest:
        description: "Also tag the image as latest"
        required: true
        default: false
        type: boolean
      platforms:
        description: "Target platforms for pushed images"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
  workflow_call:
    inputs:
      push:
        required: false
        default: false
        type: boolean
      source_ref:
        required: false
        default: ""
        type: string
      version:
        required: false
        default: ""
        type: string
      tag_latest:
        required: false
        default: false
        type: boolean
      platforms:
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
    secrets:
      SKILLPLATFORM_READ_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_ref || github.sha }}

      - name: Resolve image tags
        id: image
        env:
          IMAGE_VERSION: ${{ inputs.version }}
          IMAGE_TAG_LATEST: ${{ inputs.tag_latest }}
          IMAGE_PLATFORMS: ${{ inputs.platforms }}
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repository}"
          source_sha="$(git rev-parse HEAD)"
          short_sha="${source_sha:0:12}"

          {
            printf 'image=%s\n' "${image}"
            printf 'source_sha=%s\n' "${source_sha}"
            printf 'primary_tag=%s\n' "${image}:sha-${short_sha}"
            printf 'platforms=%s\n' "${IMAGE_PLATFORMS}"
            if [[ -n "${IMAGE_VERSION}" ]]; then
              printf 'version_tag=%s\n' "${image}:v${IMAGE_VERSION}"
            fi
            printf 'tags<<EOF\n'
            printf '%s\n' "${image}:sha-${short_sha}"
            if [[ -n "${IMAGE_VERSION}" ]]; then
              printf '%s\n' "${image}:v${IMAGE_VERSION}"
            fi
            if [[ "${IMAGE_TAG_LATEST}" == "true" ]]; then
              printf '%s\n' "${image}:latest"
            fi
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"

      - name: Validate build secret
        env:
          SKILLPLATFORM_READ_TOKEN: ${{ secrets.SKILLPLATFORM_READ_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${SKILLPLATFORM_READ_TOKEN}" ]]; then
            echo "SKILLPLATFORM_READ_TOKEN is required to build the image." >&2
            exit 1
          fi

      - name: Set up QEMU
        if: inputs.push && contains(inputs.platforms, 'arm')
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: dockerfile
          platforms: ${{ inputs.push && inputs.platforms || 'linux/amd64' }}
          push: ${{ inputs.push }}
          tags: ${{ steps.image.outputs.tags }}
          provenance: false
          secrets: |
            github_token=${{ secrets.SKILLPLATFORM_READ_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
